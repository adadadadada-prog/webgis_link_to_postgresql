<!DOCTYPE html>
<html>
    <head>
         <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
     <style>
        #map {    width: 80%;
            height: 600px;
            margin: 0 auto;}
            
     </style>
    </head>

    <body>
        <div id="map"></div>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="">
        </script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
        
        <script src="/static/key.js"></script>
        <script>
            const tk = window.TIANDITU_KEY;
            var map = L.map('map').setView([51.505, -0.09], 13);
            L.tileLayer('http://t{s}.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk='+ tk, {
            subdomains: ['0','1','2','3','4','5','6','7'],
            maxZoom: 18,
            attribution: '&copy; 天地图'
            }).addTo(map);
            // L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            //     maxZoom: 19,
            //     attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            // }).addTo(map);
            // L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            //     maxZoom: 19,
            //     attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            // }).addTo(map);

            
            
            var drawnItems = new L.FeatureGroup();
            map.addLayer(drawnItems);
            var drawControl = new L.Control.Draw({
                edit: {
                    featureGroup: drawnItems
                }
            });
            map.addControl(drawControl);
            
            


            map.on(L.Draw.Event.CREATED,async function (e) {
            var type = e.layerType,
                layer = e.layer;
            
            // Do whatever else you need to. (save to db; add to map etc)
            map.addLayer(e.layer);
            drawnItems.addLayer(e.layer)
            var res = await fetch("/matchbase",{
                method :"POST",
                headers: {
                    "Content-Type": "application/json",
                    // 'Content-Type': 'application/x-www-form-urlencoded',
                    },
                body: JSON.stringify(e.layer.toGeoJSON().geometry),
            })
            index = await res.json()
            layer._objectid = index.new_index;
            console.log(layer._objectid)

            });
            //a修改u数据部分
            map.on(L.Draw.Event.EDITED,async function (e) {
                var type = e.layerType,
                layers = e.layers;
                layers.eachLayer(function(layer)
                {console.log("修改后1的",layer.toGeoJSON().geometry)})
                
                
                
            })






            

//初始数据加载部分
            const points = {{ points | tojson }};
            points.forEach(function(point){
               layer = L.geoJSON(
                    point.geometry,
                    {
                        style: {
                            color: "red",
                            weight: 2
                        }
                    }
                ).addTo(map);
                layer.eachLayer(function(l) {        // 第2层遍历：打开 L.geoJSON 返回的容器
                    l._objectid = point.id;
                    drawnItems.addLayer(l);
                })
            })


            const lines = {{ lines | tojson }};
            lines.forEach(function(line){
                L.geoJSON(
                    line.geometry,
                    {
                        style: {
                            color: "red",
                            weight: 4
                        }
                    }
                ).addTo(map);
            })

            const polys = {{ polys | tojson }};
            polys.forEach(function(poly){
                L.geoJSON(
                    poly.geometry,
                    {
                        style: {
                            color: "red",
                            weight: 4
                        }
                    }
                ).addTo(map);
            });

            
            // L.leafletGeotiff('static/my_raster.tif', {
            // band: 0,
            // opacity: 0.7,
            // displayMin: 0,
            // displayMax: 255
            // }).addTo(map);

           

           
            
        </script>
        
    </body>
</html>
